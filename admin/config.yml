backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/livros"
public_folder: "/assets/images/livros"

collections:
  - name: "livros"
    label: "Livros"
    folder: "_livros"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Autor", name: "author", widget: "string" }
      - { label: "Capa", name: "image", widget: "image" }
      - { label: "Resenha", name: "body", widget: "markdown" }
