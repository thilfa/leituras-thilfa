backend:
  name: git-gateway
  branch: main

media_folder: "capas"
public_folder: "capas"

collections:
  - name: "resenhas"
    label: "Minhas Resenhas"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título do Livro", name: "title", widget: "string" }
      - { label: "Autor", name: "author", widget: "string" }
      - { label: "Data da Leitura", name: "date", widget: "datetime" }
      - { label: "Capa do Livro", name: "image", widget: "image" }
      - { label: "Resenha", name: "body", widget: "markdown" }
