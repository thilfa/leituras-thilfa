<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo - Leituras do Thilfa</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
      <script>
        // Abre a janela de login/recuperação automaticamente se houver um token na URL
        if (window.location.hash.includes("recovery_token") || window.location.hash.includes("invite_token")) {
          netlifyIdentity.open();
        }
      
        // Redireciona para o admin após o login
        netlifyIdentity.on('login', user => {
          window.location.href = '/admin/';
        });
      </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
